<!doctype html>
<html>
  <head>
    <style>
      body {
        margin: 0;
        padding: 0;
        overflow: hidden;
        /* background: transparent; */ /* Original line, now replaced */
        display: flex;
        justify-content: center;
        align-items: center;
        height: 100vh;
        font-family: "Rajdhani", sans-serif;
        color: white;
        /* Added radial glow to avoid exposing image edges */
        background: radial-gradient(
          circle,
          rgba(0, 255, 238, 0.05) 0%,
          transparent 70%
        );
      }
      .splash-container {
        text-align: center;
        animation: fade-in 1s ease-out;
        position: relative;
      }
      .splash-img {
        width: 400px;
        /* Removed drop-shadow as it was exposing image bounding box */
      }
      .loading-text {
        margin-top: 20px;
        letter-spacing: 4px;
        text-transform: uppercase;
        font-size: 14px;
        opacity: 0.8;
        animation: pulse 1.5s infinite;
      }
      @keyframes fade-in {
        from {
          opacity: 0;
          transform: scale(0.95);
        }
        to {
          opacity: 1;
          transform: scale(1);
        }
      }
      @keyframes pulse {
        0% {
          opacity: 0.4;
        }
        50% {
          opacity: 1;
        }
        100% {
          opacity: 0.4;
        }
      }
    </style>
  </head>
  <body>
    <div class="splash-container">
      <img
        src="../Assets/splash_screen.png"
        class="splash-img"
        alt="Hutch Turbo"
      />
      <div class="loading-text">Initializing Systems...</div>
    </div>
  </body>
</html>
